name: Test Textish module

on:
  push: &filters
    paths:
      - ".github/workflows/ci.yml"
      - "**.py"
    branches:
      - staging
  pull_request: *filters

env:
  PYTEST_ADDOPTS: "--color=yes"

jobs:
  # These three jobs produce the required status checks that branch protection
  # looks for by name: "Test (Python 3.12)", "Test (Python 3.13)", etc.
  # They run on ubuntu-latest as the canonical gating build.
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run pytest tests -v

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run mypy
        run: poetry run mypy

  # Cross-platform smoke tests. Not required by branch protection, but failures
  # are visible on the PR so platform-specific issues are caught before merge.
  test-os:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run pytest tests -v
