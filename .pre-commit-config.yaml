repos:
-   repo: https://github.com/python-poetry/poetry
    rev: "2.3.2"
    hooks:
    -   id: poetry-check
    -   id: poetry-lock
    -   id: poetry-install

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.10"
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format